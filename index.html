```html
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Canchas Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Canchas Pro ⚽</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero text-center text-white">
  <div class="container">
    <h1>Reserva tu cancha fácil</h1>
    <p>Gestiona horarios y compra bebidas</p>
  </div>
</section>

<!-- RESERVA -->
<section class="container mt-5">
  <h2 class="text-center mb-4">Reservar Cancha</h2>

  <form id="formReserva">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Nombre</label>
        <input id="nombre" class="form-control" required minlength="3">
      </div>

      <div class="col-md-6 mb-3">
        <label>Fecha</label>
        <input id="fecha" type="date" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Hora</label>
        <input id="hora" type="time" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>Cancha</label>
        <select id="cancha" class="form-control" required>
          <option value="">Seleccione</option>
          <option value="1">Cancha 1</option>
          <option value="2">Cancha 2</option>
          <option value="3">Cancha 3</option>
        </select>
      </div>
    </div>

    <button class="btn btn-success w-100">Reservar</button>
  </form>
</section>

<!-- TABLA -->
<section class="container mt-5">
  <h2 class="text-center mb-4">Reservas</h2>

  <table class="table table-striped text-center">
    <thead class="table-dark">
      <tr>
        <th>Nombre</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Cancha</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaReservas"></tbody>
  </table>
</section>

<!-- TIENDA -->
<section class="container mt-5">
  <h2 class="text-center mb-4">Tienda</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="card">
        <img src="img/agua.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Agua</h5>
          <p>$1.000</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="img/gatorade.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Gatorade</h5>
          <p>$3.000</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="img/cocacola.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5>Coca-Cola</h5>
          <p>$2.500</p>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  Proyecto académico - Canchas Pro © 2026
</footer>

<script src="js/app.js"></script>

</body>
</html>
